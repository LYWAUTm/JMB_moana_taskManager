<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Liste des tâches - JMB TASKMANAGER</title>

    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- CSS PERSO -->

    <link rel="stylesheet" href="../CSS/style.css">
</head>

<!------------------------------- BODY + HEADER + TITRE ------------------------------------>

<body>
    <header class="box">
        <div class="titre_1">
            <h1>JMB TASKMANAGER</h1>
        </div>

    </header>


    <!-----------------MAIN + FORMULAIRE LISTE TACHES ------------------------>
    <main>
        <section>
            <form id="form_list" class="w-100 box">

                <div class="row align-items-end">

                    <!-- CATEGORIE 
                    <div class="col-3 mb-3">
                        <label for="task_tag" class="form-label">Catégorie</label>
                        <select class="form-select" id="task_tag">
                            <option value="">Choisir...</option>
                            <option value="personnel">Personnel</option>
                            <option value="travail">Travail</option>
                            <option value="urgent">Urgent</option>
                        </select>
                    </div>-->


                    <!-- TITRE DE LA TACHE -->
                    <div class="col-6 mb-3">
                        <label for="task_name" class="form-label">Titre</label>
                        <input type="text" class="form-control" id="task_name" placeholder=" Intitulé de la tâche "
                            required>
                    </div>

                    <!-- CASE A COCHER -->
                    <div class="col-3 mb-3">
                        <div class="form-checkbox">
                            <label for="checkbox" class="form-check-label">Effectué</label>
                            <input type="checkbox" class="form-check-input" id="checkbox">
                        </div>
                    </div>
                </div>

                <!-- DESCRIPTION DE LA TACHE -->
                <div class="mb-3">
                    <label for="task_def" class="form-label">Description</label>
                    <textarea class="form-control" id="task_def" rows="2"
                        placeholder="Description de la tâche"></textarea>
                </div>


                <!-- BOUTON AJOUTER + SUPPRIMER -->
                <div class="d-flex gap-3">
                    <!-- un type submit et l'autre button pour différencier chacun lors de son d"clenchement -->
                    <button type="submit" class="btn btn-success w100" id="btn_add">Ajouter</button>
                    <button type="button" class="btn btn-danger w100" id="btn_del">Supprimer</button>
                </div>

                <div>
                    <button id="btn_logout" class="btn btn-danger w-100">Logout
                    </button>
                </div>


            </form>


            <!-- LISTE DES TÂCHES -->
            <ul id="list" class="mt-4 w-100 list-group"></ul>

        </section>
    </main>


    <!--------------------------------- FOOTER ------------------------------------->
    <footer></footer>


    <!------------------------------- SCRIPT JS ------------------------------------>

    <!-- JS BOOTSTRAP -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- JS PERSO -->
    <script src="../js/tasklist.js"></script>
    <script src="../js/login.js"></script>



</body>

</html>
